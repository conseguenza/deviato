<!DOCTYPE html>
<html lang="en" class="light">
<head>

    <meta name="twitter:image" content="https://kidnap.lol/3ds/images/fashion.gif">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="entry-overlay" id="entryOverlay">
        <div class="overlay-content">
            <h2 class="entry-text">Click to enter</h2>
        </div>
    </div>
    <div class="loading-spinner" id="loadingSpinner"></div>

    <div class="main-content" id="mainContent">
        <div class="main-wrapper">
            <div class="scene">
                <div class="container-3d" id="container3d">
                    <section class="hero">
                        <div class="profile-pic-wrapper">
                            <div class="profile-pic" id="profilePic">
                                <img id="avatarImg" src="images/fashion.gif" alt="fashion profile">
                            </div>
                            <div class="status-indicator" id="statusIndicator">
                                <i class="fas fa-circle"></i>
                            </div>
                        </div>
                        <h1 class="username">
                            <span class="typewriter" id="discordUsername">3ds</span>
                        </h1>
                        <div class="profile-views">
                            <span class="views-count">owner</span>@ kidnap.lol
                        </div>
                        <div class="badges-container">
                            <div class="profile-badges">
                                <div class="badge-wrapper">
                                    <img src="images/Verified.svg" alt="Verified" class="verified-badge">
                                    <span class="badge-tooltip">Verified Profile</span>
                                </div>
                                <div class="badge-wrapper">
                                    <img src="images/developer.png" alt="Developer" class="early-badge">
                                    <span class="badge-tooltip">Developer</span>
                                </div>
                                <div class="badge-wrapper">
                                    <img src="images/staff.png" alt="Staff" class="staff-badge">
                                    <span class="badge-tooltip">Staff Member</span>
                                </div>
                            </div>
                        </div>
                        
                        <div class="contact-links">

                                <span class="contact-icon"><i class="fab fa-discord"></i></span>
                                <span class="contact-text" id="discordTag">commensurable</span>
                            </div>
                            <div class="contact-item static-contact">
                                <span class="contact-icon"><i class="fab fa-tiktok"></i></span>
                                <span class="contact-text">indicate</span>
                            </div>
                            <a href="https://discord.gg/common" target="_blank" rel="noopener noreferrer" class="contact-item">
                                <span class="contact-icon"><i class="fab fa-discord"></i></span>
                                <span class="contact-text">/common</span>
                            </a>
                        </div>
                    </section>
                </div>
            </div>
        </div>

        <div class="cursor-glow" id="cursorGlow"></div>

        <audio id="bgMusic" loop preload="auto">
            <source src="media/fashion.mp3" type="audio/mpeg">
        </audio>
        <video id="bgVideo" loop muted playsinline preload="auto">
            <source src="media/fashion.mp4" type="video/mp4">
        </video>
    </div>

    <!-- 3D Grid Canvas -->
    <canvas id="gridCanvas" class="grid-canvas"></canvas>

    <script src="js/init.js"></script>
    <script src="js/3d.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/snow.js"></script>
    <script src="js/discord.js"></script>
    <script src="js/grid.js"></script>
